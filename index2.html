<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Model-Earth</title>

  <!-- ============================================================= -->
  <!-- Google Analytics (GA4) - replace G-XXXXXXXXXX with your ID    -->
  <!-- ============================================================= -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>

  <!-- Google's <model-viewer> web component for rendering GLB -->
  <!--<script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>-->

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: system-ui, sans-serif; }
    body { display: flex; flex-direction: column; background: #f4f4f6; }
    header { padding: 12px 16px; background: #1f2430; color: #fff; }
    header h1 { margin: 0; font-size: 16px; font-weight: 600; }
    header p { margin: 2px 0 0; font-size: 12px; opacity: .7; }
    model-viewer { flex: 1; width: 100%; background: #e9eaee; }
    #loader { position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%); font-size: 13px; color: #555; }
  </style>
</head>
<body>
  <header>
  
  </header>

  <model-viewer
      id="viewer"
      src="assets/model.glb"
      alt="3D model"
      camera-controls
      auto-rotate
      shadow-intensity="1"
      exposure="1">
    <div id="loader" slot="poster">Loading 3D model…</div>
  </model-viewer>

  <script>
    // ---------------------------------------------------------------
    // Load metadata, then wire it into GA4 events as custom parameters
    // ---------------------------------------------------------------
    let META = {};

    async function init() {
      try {
        META = await (await fetch('metadata1.json')).json();
      } catch (e) {
        console.warn('metadata1.json not loaded', e);
      }

      // Header display
      document.getElementById('assetTitle').textContent =
        META.title_name || 'Untitled Asset';
      document.getElementById('assetMeta').textContent =
        [
          META.chapter_no  ? 'Chapter ' + META.chapter_no : '',
          META.page_number ? 'Page ' + META.page_number   : '',
          META.isbn        ? 'ISBN ' + META.isbn           : ''
        ].filter(Boolean).join('  •  ');

      // Fire a page/asset-open event with all metadata attached
      track('asset_view');
    }

    // Helper: send a GA4 event with the metadata as custom parameters
    function track(eventName, extra) {
      const params = Object.assign({
        title_name:  META.title_name  || '',
        chapter_no:  META.chapter_no   || '',
        page_number: META.page_number  || '',
        asset_name:  META.asset_name   || '',
        isbn:        META.isbn         || ''
      }, extra || {});
      if (typeof gtag === 'function') gtag('event', eventName, params);
      console.log('GA event:', eventName, params);
    }

    // ---------------------------------------------------------------
    // Interaction tracking
    // ---------------------------------------------------------------
    const viewer = document.getElementById('viewer');

    viewer.addEventListener('load', () => track('model_loaded'));

    // First user interaction (orbit/zoom)
    let interacted = false;
    viewer.addEventListener('camera-change', (e) => {
      if (!interacted && e.detail.source === 'user-interaction') {
        interacted = true;
        track('model_interact');
      }
    });

    // Time spent on the asset when leaving
    const start = Date.now();
    window.addEventListener('beforeunload', () => {
      track('asset_time', { engagement_seconds: Math.round((Date.now() - start) / 1000) });
    });

    init();
  </script>
</body>
</html>
